<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Найти бронь — RoomFox</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #e0f2fe 0%, #b9e6fa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(2px);
            border-radius: 48px;
            box-shadow: 0 25px 45px -12px rgba(0, 100, 120, 0.35),
                        0 4px 12px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 520px;
            padding: 2.2rem 2rem 2.5rem;
            transition: transform 0.25s ease, box-shadow 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .form-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 50px -15px rgba(0, 120, 140, 0.4);
        }

        .form-title {
            font-size: 1.9rem;
            font-weight: 600;
            color: #0369a1;
            margin-bottom: 0.3rem;
            letter-spacing: -0.3px;
            text-align: center;
        }

        .form-subtitle {
            text-align: center;
            color: #2c7da0;
            font-weight: 400;
            margin-bottom: 2rem;
            border-bottom: 2px solid #b7e0ff;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 8px;
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 1.6rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: #0b5e7e;
            margin-bottom: 0.5rem;
            margin-left: 0.5rem;
        }

        input {
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            font-family: inherit;
            border: 2px solid #cbeafe;
            border-radius: 60px;
            background-color: #ffffff;
            transition: all 0.25s ease;
            outline: none;
            color: #075985;
            font-weight: 500;
        }

        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
            background-color: #fefefe;
        }

        input::placeholder {
            color: #9bc4e0;
            font-weight: 400;
            font-size: 0.9rem;
        }

        button {
            background: linear-gradient(105deg, #38bdf8 0%, #0284c7 100%);
            border: none;
            width: 100%;
            padding: 1rem 1rem;
            font-size: 1.1rem;
            font-weight: 700;
            font-family: inherit;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 10px 18px -8px #0c4e6e;
            margin-top: 0.5rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: linear-gradient(105deg, #0ea5e9 0%, #0369a1 100%);
            transform: scale(1.01);
            box-shadow: 0 18px 25px -10px #075985;
        }

        button:active {
            transform: scale(0.98);
        }

        button::after {
            content: "🔍";
            font-size: 1.2rem;
            transition: transform 0.2s;
        }

        button:hover::after {
            transform: scale(1.1);
        }

        @media (max-width: 550px) {
            .form-card {
                padding: 1.8rem 1.5rem;
                border-radius: 36px;
            }
            .form-title {
                font-size: 1.6rem;
            }
            input {
                padding: 0.85rem 1.2rem;
            }
            button {
                padding: 0.85rem;
                font-size: 1rem;
            }
        }

        @media (max-width: 450px) {
            body {
                padding: 12px;
            }
            .form-card {
                padding: 1.5rem 1.2rem;
            }
            .form-title {
                font-size: 1.4rem;
            }
        }

        .bg-icon {
            position: fixed;
            bottom: 20px;
            right: 20px;
            opacity: 0.2;
            font-size: 70px;
            pointer-events: none;
            z-index: 0;
        }

        @media (min-width: 1400px) {
            .form-card {
                max-width: 600px;
                padding: 2.5rem;
            }
        }
    </style>
</head>
<body>

<div class="form-card">
    <div class="form-title">🔷 Найти бронь</div>
    <div style="text-align: center;">
        <span class="form-subtitle">Вас приветствует санаторий "Надежда"</span>
    </div>

    <form onsubmit="handleSubmit(event)">
        <div class="input-group">
            <label>📌 Номер группы</label>
            <input type="text" placeholder="1234" class="group-num" autocomplete="off" />
        </div>
        <div class="input-group">
            <label>✉️ Электронная почта</label>
            <input type="email" placeholder="you@example.com" class="email" autocomplete="off" />
        </div>
        <button type="submit">Найти бронь</button>
    </form>
    <div style="font-size: 12px; text-align: center; margin-top: 24px; color: #3898c3;">
        Откроется страница с деталями бронирования
    </div>
</div>

<div class="bg-icon">🏖️</div>

<script>
    function handleSubmit(event){
        event.preventDefault()

        const groupNum=document.querySelector(".group-num").value
        const email=document.querySelector(".email").value

        if (!groupNum.trim() || !email.trim()){
            alert("Пожалуйста, заполните номер группы и почту")
            return
        }

        const link=`https://module.roomfox.ru/booking/${encodeURIComponent(groupNum)}/${encodeURIComponent(email)}/nadezhdaTest`
        window.open(link, "_blank")
    }
</script>
</body>
</html>
